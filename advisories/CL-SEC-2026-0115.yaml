id: CL-SEC-2026-0115
title: "Secret key material not zeroized after use in pure-tls"
reported: 2026-03-31
published: null
severity: medium
cvss: "CVSS:3.1/AV:L/AC:H/PR:L/UI:N/S:U/C:H/I:N/A:N"
cvss-score: 4.7
cwe: CWE-226

project:
  name: pure-tls
  homepage: https://github.com/atgreen/pure-tls
  affected-systems:
    - pure-tls

affected:
  introduced-in: "d78526befdbe9a23d82f8cfa39eed349e3a37848"
  fixed-in:
    commit: "3d2db0d"
    version: "1.11.0"
  affected-dists:
    - dist: ocicl
      first-affected: "20260215-d78526b"
      last-affected: null
      fixed-in: null

description: |
  Although pure-tls exports zeroize and with-zeroized-vector, these
  functions are never called anywhere in the codebase. Sensitive
  cryptographic material persists in memory indefinitely, including
  AEAD keys and IVs, traffic secrets in key-schedule structs, shared
  secrets from DH key exchange, private keys loaded via
  load-private-key, and the global server ticket encryption key.

  If an attacker gains a memory read primitive (via a separate
  vulnerability, cold boot attack, or core dump), they can recover
  TLS session keys and decrypt past and current sessions. This
  undermines TLS 1.3 forward secrecy guarantees which assume
  ephemeral keys are destroyed.

recommendation: |
  Call zeroize on all sensitive key material in unwind-protect cleanup
  forms. Use with-zeroized-vector for ephemeral secrets. While GC may
  copy data, zeroizing reduces the exposure window as a defense-in-depth
  measure.

references:
  - https://cwe.mitre.org/data/definitions/226.html

id: CL-SEC-2026-0123
title: "NATS protocol injection via unsanitized subject and reply-to fields in cl-nats"
reported: 2026-03-31
published: 2026-03-31
severity: medium
cvss: "CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:N"
cvss-score: 6.8
cwe: CWE-93

project:
  name: cl-nats
  homepage: https://github.com/atgreen/cl-nats
  affected-systems:
    - cl-nats

affected:
  introduced-in:  # 2026-02-14
    commit: "209806c"
    url: "https://github.com/atgreen/cl-nats/commit/209806c"
  fixed-in:
    commit: "074433b"
    version: "1.0.0"
    url: "https://github.com/atgreen/cl-nats/commit/074433b"
  affected-dists: []
    # cl-nats is not in Quicklisp or ocicl

audit:
  verdict: severity-adjusted
  original-severity: high
  notes: |
    Depends on application feeding attacker-controlled data into a low-level messaging API. Current code now validates, confirming prior risk.

description: |
  Subject names, reply-to addresses, and queue group names are
  interpolated directly into PUB, SUB, and HPUB wire protocol commands
  using format with no validation. A subject containing CRLF characters
  can inject arbitrary NATS protocol commands onto the wire, potentially
  subscribing to unauthorized subjects or publishing rogue messages.

  This is exploitable whenever user-controlled input flows into
  publish, subscribe, or request subject parameters.

recommendation: |
  Validate all subject, reply-to, and queue-group strings before
  interpolation. NATS subjects must not contain spaces, carriage
  returns, newlines, or null bytes. Reject or signal an error on
  invalid characters.

references:
  - https://cwe.mitre.org/data/definitions/93.html

description: |
  The CSS sanitizer uses a naive semicolon-split parser and does not
  strip CSS comments before performing danger checks. An attacker can
  use CSS comments to break up dangerous keywords, e.g.,
  "exp/**/ression(alert(1))" bypasses the check for "expression"
  because the contiguous string does not appear in the value. After
  the browser's CSS parser removes the comment, expression() executes
  JavaScript in legacy Internet Explorer.

  The email policy allows the style attribute globally on all allowed
  tags, making this exploitable for any application using that policy.

recommendation: |
  Strip CSS comments (/* ... */) from CSS values before performing
  danger checks. Also strip them from the entire CSS string before
  parsing.

references:

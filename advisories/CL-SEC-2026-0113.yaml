description: |
  RFC 8446 Section 4.1.3 requires clients to abort the handshake with
  an illegal_parameter alert if the ServerHello legacy_session_id_echo
  does not match the legacy_session_id sent in the ClientHello. The
  process-server-hello function never performs this comparison, even
  though the client-handshake struct stores the legacy-session-id.

  A MITM proxy could tamper with the session ID without detection,
  potentially confusing middleboxes or causing session-mismatch issues.

recommendation: |
  After parsing ServerHello, compare server-hello-legacy-session-id-echo
  against client-handshake-legacy-session-id and abort with an
  illegal_parameter alert if they differ.

references:
  - https://cwe.mitre.org/data/definitions/345.html

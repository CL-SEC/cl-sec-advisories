id: CL-SEC-2026-0113
title: "Missing ServerHello legacy_session_id_echo validation in pure-tls"
reported: 2026-03-31
published: null
severity: medium
cvss: "CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:N/I:L/A:L"

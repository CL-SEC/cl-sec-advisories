id: CL-SEC-2026-0135
title: "Predictable temporary directory enables symlink and race attacks in cl-selfupdate"
reported: 2026-03-31
published: null
severity: high
cvss: "CVSS:3.1/AV:L/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:H"

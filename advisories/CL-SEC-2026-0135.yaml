description: |
  The temporary directory used for downloads is constructed with a
  predictable name based on get-universal-time (wall-clock seconds).
  A local attacker can pre-create the directory or a symlink before the
  update runs. Since ensure-directories-exist does not fail if the
  directory already exists, the attacker controls where files are
  written. Between download and extraction, a local attacker can also
  swap the archive file (TOCTOU race). The temporary directory is
  never cleaned up.

recommendation: |
  Use mkdtemp(3) semantics for creating temporary directories with
  random, exclusive creation. Clean up temporary directories after
  use in an unwind-protect. Open files with exclusive creation flags
  where possible.

references:

description: |
  When a tag is not in the allowlist and not in the dangerous tags
  list, it is removed but its children are promoted to the parent. The
  dangerous tags list is missing svg, math, iframe, object, embed,
  template, xmp, listing, plaintext, base, meta, link, head, and
  title. These tags have their content promoted rather than fully
  removed.

  The most critical missing entry is svg, which enables mutation XSS
  through SVG/MathML namespace confusion where the sanitizer's DOM
  tree differs from the browser's re-parsing of the sanitized output.

recommendation: |
  Add svg, math, iframe, object, embed, applet, template, xmp,
  listing, plaintext, base, meta, link, head, and title to the
  dangerous tags list for full content removal.

references:
  - https://cwe.mitre.org/data/definitions/79.html

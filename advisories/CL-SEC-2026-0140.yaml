description: |
  The days parameter used to compute the certificate validity period
  is not validated. Negative values produce certificates where
  not-after precedes not-before (malformed per RFC 5280 Section
  4.1.2.5). Zero produces a zero-second validity period. Extremely
  large values produce unreasonable validity periods. These malformed
  certificates can cause validation failures, interoperability
  problems, or create a false sense of security.

recommendation: |
  Validate that days is a positive integer. Enforce a reasonable
  maximum (e.g., 825 days for leaf certificates per CA/Browser Forum
  guidelines, or 36500 days as a sanity cap). Signal an error for
  invalid inputs.


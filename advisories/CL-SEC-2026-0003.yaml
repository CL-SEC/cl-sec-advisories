description: |
  Both make-channel (with :tls t) and make-secure-channel default to
  :tls-verify nil / :verify nil, meaning TLS connections do not
  validate the server's certificate by default.

  In channel.lisp:

      (defun make-channel (host port &key ... tls (tls-verify nil) ...)

      (defun make-secure-channel (host port &key ... (verify nil) ...)

  This is forwarded to wrap-stream-with-tls in tls.lisp, which passes
  +VERIFY-NONE+ to pure-tls when verify is nil.

  A caller using make-secure-channel reasonably expects a secure
  connection, but gets one that is vulnerable to man-in-the-middle
  interception.  An attacker who can intercept the TCP connection
  (via DNS hijacking, ARP poisoning, BGP hijacking, or a compromised
  network intermediary) can present their own certificate and proxy
  all traffic in both directions.

  The OpenAI, Anthropic, and most other gRPC client libraries in
  other languages default to verifying server certificates when TLS
  is enabled.

recommendation: |
  Change the default for tls-verify / verify to T when TLS is enabled:

      (defun make-channel (host port &key ... tls (tls-verify tls) ...)

      (defun make-secure-channel (host port &key ... (verify t) ...)

  Callers who need to disable verification (e.g. for development with
  self-signed certificates) can still pass :tls-verify nil or
  :verify nil explicitly.

references:
  - https://cwe.mitre.org/data/definitions/295.html
  - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/09-Testing_for_Weak_Cryptography/01-Testing_for_Weak_Transport_Layer_Security

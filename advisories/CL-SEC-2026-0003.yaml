id: CL-SEC-2026-0003
title: "TLS certificate verification disabled by default in gRPC client"
reported: 2026-03-31
published: null
severity: high
cvss: "CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:H/I:H/A:N"
cvss-score: 7.4
cwe: CWE-295  # Improper Certificate Validation


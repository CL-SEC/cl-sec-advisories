description: |
  The server generates ticket_age_add values using Common Lisp's
  (random (expt 2 32)), which uses the implementation's default PRNG,
  typically a Mersenne Twister or similar non-cryptographic generator.
  RFC 8446 Section 4.6.1 requires fresh values to obfuscate ticket age
  and prevent correlation attacks.

  An observer who can see multiple NewSessionTicket messages may be
  able to predict future ticket_age_add values and de-obfuscate ticket
  ages, enabling session correlation and traffic analysis. The
  random-grease-value function in src/constants.lisp also uses the
  non-cryptographic (random ...) for GREASE values.

recommendation: |
  Replace (random (expt 2 32)) with a cryptographically secure random
  source, e.g., extracting 4 bytes from a CSPRNG and decoding them as
  a uint32.

references:
  - https://cwe.mitre.org/data/definitions/338.html

description: |
  The Transfer-Encoding parser uses match-i-case for case-insensitive
  matching of "chunked" (src/parser.lisp lines 353-377).  If the
  value does not exactly match after trimming leading whitespace,
  chunkedp is set to nil.

  Obfuscated variants that some proxies accept as chunked are treated
  as non-chunked by fast-http:

    - "chunked " (trailing space): fast-http sets chunkedp = nil
    - "chunked\x00" (null byte): treated as not-chunked
    - "chunked, identity": treated as not-chunked

  The trailing-space case is particularly dangerous: fast-http sets
  chunkedp = nil while a front-end proxy that trims whitespace
  before comparison sees "chunked", creating a TE-TE desync.

  Additionally, duplicate Transfer-Encoding headers are silently
  accepted with the last value winning (line 324), enabling:

      Transfer-Encoding: chunked
      Transfer-Encoding: identity

  The second header overrides chunkedp to nil.  A proxy using the
  first value sees chunked; fast-http sees identity.

recommendation: |
  Trim whitespace from the Transfer-Encoding value before comparison.
  Reject requests with multiple conflicting Transfer-Encoding headers.
  Reject requests with unrecognized Transfer-Encoding values.

references:
  - https://cwe.mitre.org/data/definitions/444.html
  - https://portswigger.net/research/http-desync-attacks

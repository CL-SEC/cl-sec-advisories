description: |
  User prompts are rendered through 3bmd (Markdown-to-HTML converter)
  and injected into the page via innerHTML and outerHTML on the client
  side. The Markdown-to-HTML conversion does not sanitize inline HTML,
  so a user prompt containing script tags or event handler attributes
  will be converted to executable HTML.

  In a multi-user scenario (shared session-data hash table and
  WebSocket chat rooms), this is a stored XSS vulnerability where one
  user's malicious prompt is rendered in another user's browser.

recommendation: |
  Sanitize HTML output from the Markdown renderer before DOM injection.
  Use textContent instead of innerHTML where possible, or use a DOM
  sanitization library like DOMPurify on the client side. Alternatively,
  configure 3bmd to strip raw HTML from Markdown input.


description: |
  The URI parser uses Common Lisp's read-from-string to parse the port
  component of a URI:

      (setq port (read-from-string port))

  read-from-string invokes the full Lisp reader instead of a numeric
  parser, enabling denial of service through parse-uri:

  1. Floating-point overflow.  The URI state machine's port tokenizer
     accepts digits, dots, and letters such as 'e', so a URI like:

         http://example.com:1e100000000000000/

     delivers the string "1e100000000000000" to read-from-string,
     which signals a floating-point-overflow condition in most
     implementations, crashing any handler without an enclosing
     handler-case.

  2. Bignum allocation.  A port string containing millions of digit
     characters (e.g. http://example.com:111...111/) causes
     read-from-string to allocate an arbitrarily large bignum,
     consuming CPU and memory.  The resulting integer passes both
     the numberp and plusp checks, so no error is raised.

  Additionally, no port range validation is performed.  Any positive
  number is accepted, including values far outside the valid TCP port
  range of 1-65535.

  Note: while read-from-string can also execute arbitrary code via the
  #. reader macro when *read-eval* is T (the default), the URI parser's
  state machine treats # as a fragment delimiter, preventing #. from
  reaching the port code path through parse-uri.  The #. vector is only
  reachable if application code passes unsanitized strings to
  read-from-string outside of parse-uri.

recommendation: |
  Replace read-from-string with parse-integer and add port range
  validation:

      (setq port (parse-integer port :junk-allowed nil))
      (when (not (<= 1 port 65535))
        (error "port not in valid range: ~d." port))

  parse-integer accepts only decimal integers, rejecting floats and
  reader macros.  The range check prevents bignum allocation abuse
  and ensures only valid TCP port numbers are accepted.


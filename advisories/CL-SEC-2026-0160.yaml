description: |
  The URI parser uses Common Lisp's read-from-string to parse the port
  component of a URI:

      (setq port (read-from-string port))

  read-from-string invokes the full Lisp reader, which can execute
  arbitrary code via the #. reader macro when *read-eval* is T (the
  default).  An attacker who can supply a URI to any application using
  puri can achieve arbitrary code execution.  For example:

      http://evil.com:#.(uiop:run-program "id" :output :string)/path

  The numberp check after the read only fires after the reader has
  already executed any side effects.  Even with *read-eval* bound to
  NIL, read-from-string can construct arbitrary Lisp objects that are
  not numbers, causing type confusion downstream.

recommendation: |
  Replace read-from-string with parse-integer for port number parsing:

      (setq port (parse-integer port :junk-allowed nil))

  This parses only decimal integers and has no code execution risk.

references:

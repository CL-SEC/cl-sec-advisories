id: CL-SEC-2026-0138
title: "No protection against version downgrade attacks in cl-selfupdate"
reported: 2026-03-31
published: 2026-03-31
severity: low
cvss: "CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:N/I:L/A:N"

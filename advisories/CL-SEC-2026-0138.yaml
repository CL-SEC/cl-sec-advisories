  name: cl-selfupdate
  homepage: https://github.com/atgreen/cl-selfupdate
  affected-systems:
    - cl-selfupdate

affected:
  introduced-in:  # 2026-01-13
    commit: "30134b7"
    url: "https://github.com/atgreen/cl-selfupdate/commit/30134b7"
  fixed-in:
    commit: "150b5d2"

audit:
  verdict: severity-adjusted
  original-severity: medium
  notes: |
    No-downgrade protection now exists on high-level update-self path. Should be scoped to older versions or lower-level API, not described as present broad flaw.

description: |
  The download-update function does not perform any version comparison.
  If a caller passes a :release argument directly, there is no check
  that the release version is newer than the current version. The
  function will install any release including older ones with known
  vulnerabilities.

  Furthermore, detect-latest fetches at most 30 releases per page. If
  an attacker can create enough fake releases to push the real latest
  beyond page 1, detect-latest would return a stale version.

recommendation: |
  Enforce version comparison in download-update and apply-update.
  Paginate through all releases in detect-latest, or increase the page
  size and document the limitation.

references:
  - https://cwe.mitre.org/data/definitions/757.html

audit:
  verdict: severity-adjusted
  original-severity: medium
  notes: |
    Generation-side hardening against null-prefix ambiguity. Impact depends on whether downstream certificate consumers are vulnerable to the legacy attack.

description: |
  The encode-name function passes CN, O, and OU values directly to
  encode-utf8-string without any validation. There is no check for
  string length (DirectoryString maximum 64 characters for CN per
  RFC 5280), null bytes, empty strings, or control characters.

  A CN containing a null byte could enable null prefix attacks where
  certificate validators see a truncated CN. For example,
  CN="evil.com\0.legitimate.com" might pass validation for
  legitimate.com in vulnerable parsers (see CVE-2009-2408).

recommendation: |
  Validate CN, O, and OU against RFC 5280 constraints: maximum 64
  characters for CN, reject null bytes and control characters, reject
  empty strings.


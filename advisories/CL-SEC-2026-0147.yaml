  notes: |
    Client operates within OCI distribution model where content-addressed digests identify content. Advisory overstates if implying no integrity linkage at all.

description: |
  When ocicl downloads a system package, it fetches an OCI manifest
  containing layer digests, then retrieves the blob by that digest
  URL. However, the client never independently verifies that the
  received blob content actually hashes to the claimed SHA-256
  digest.

  The project documents GPG signature verification and sigstore
  rekor transparency log integration in the README, but these are
  entirely manual processes. The download-system, get-blob, and
  download-and-install functions in src/ocicl.lisp perform no
  cryptographic verification of package content before extracting
  and installing it.

  This means the client relies entirely on TLS transport security
  and registry-side digest enforcement. If TLS is disabled (via
  -k/--insecure flag or OCICL_INSECURE env var), or if the
  registry itself is compromised, malicious packages can be
  installed without detection. Even with TLS enabled, a
  compromised or malicious registry can serve arbitrary content.

  The ocicl.csv file records the manifest digest alongside each
  installed system, but this digest is never verified against the
  actual content on disk after extraction.

recommendation: |
  After downloading a blob, compute its SHA-256 hash using
  ironclad (already a dependency) and compare it to the digest
  from the manifest before extracting:

    (let ((computed (ironclad:byte-array-to-hex-string
                     (ironclad:digest-sequence :sha256 blob-bytes))))
      (unless (string= computed expected-digest)
        (error "Digest mismatch for ~A" system)))

  Additionally, consider making sigstore/GPG verification opt-out
  rather than opt-in, so that package authenticity is verified by
  default.

references:
  - https://cwe.mitre.org/data/definitions/345.html
  - https://github.com/opencontainers/distribution-spec/blob/main/spec.md

description: |
  The function decode-double-encoded-entities runs as a post-processing
  step on the final serialized HTML string, reversing Plump's safe
  entity encoding of &amp;gt;, &amp;lt;, &amp;quot;, and &amp;apos;
  back into their active forms. This post-serialization string rewriting
  is an anti-pattern that creates a fragile security boundary.

  User-controlled text content containing literal entity-like strings
  can be decoded into active HTML characters. The triple-encoding
  regex has a negative lookahead that can be bypassed with entity names
  not in the exclusion list. Any change to Plump's serialization
  behavior could make this directly exploitable for XSS.

recommendation: |
  Remove decode-double-encoded-entities entirely. If Plump's
  serialization produces double-encoded entities, address this by
  configuring Plump's serializer or by custom serialization -- never
  by regex-replacing the output of a security-critical process.

references:
  - https://cwe.mitre.org/data/definitions/79.html

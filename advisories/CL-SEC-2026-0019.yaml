description: |
  The session middleware (src/middleware/session.lisp lines 26-32)
  accepts client-supplied session IDs even when no corresponding
  session exists in the store:

      (let* ((sid (extract-sid state env))
             (session (and sid (fetch-session store sid)))
             (sid (or sid (generate-sid state env)))
             ...)

  When a client supplies a session ID via cookie but no session data
  exists in the store for that ID (fetch-session returns nil), the
  server still uses the client-supplied sid (line 29: the or form
  returns sid because it is non-nil, so generate-sid is never called).
  The session is then stored under this attacker-controlled ID.

  An attacker can exploit this for session fixation:

    1. Generate a valid-format session ID (40 hex chars, matching the
       validator regex in state/cookie.lisp)
    2. Inject it into a victim's browser via a subdomain cookie, XSS,
       or link with cookie-setting redirect
    3. Wait for the victim to authenticate
    4. Use the known session ID to access the victim's authenticated
       session

recommendation: |
  Always generate a new server-side session ID when no existing session
  is found in the store, regardless of what the client supplied:

      (let* ((sid (extract-sid state env))
             (session (and sid (fetch-session store sid)))
             (sid (if session sid (generate-sid state env)))
             ...)

  This ensures that client-supplied IDs are only honored when they
  correspond to an existing server-side session.

references:
  - https://cwe.mitre.org/data/definitions/384.html
  - https://owasp.org/www-community/attacks/Session_fixation

description: |
  The Key Usage extension encoding uses a fragile unused-bits
  calculation that only works for single-byte bit strings by
  coincidence. The decipherOnly usage (bit 8 in RFC 5280) cannot be
  encoded correctly because the code only produces one byte. When no
  usages are specified, a meaningless extension is silently produced
  with 7 unused bits and a zero byte.

recommendation: |
  Rewrite the unused-bits calculation to handle multi-byte bit strings.
  Reject empty usage sets. Add decipherOnly to the supported usages.


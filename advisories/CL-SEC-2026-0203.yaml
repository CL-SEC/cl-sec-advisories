description: |
  Generated deserialize-from-bytes methods for protobuf messages recurse
  into nested message fields without any depth limit.  A malicious
  protobuf payload containing deeply nested embedded messages (e.g.,
  message A containing message A containing message A...) causes
  unbounded stack recursion, crashing the process with a stack overflow.

  The relevant code path in codegen.lisp generates:

      (let ((data (read-length-delimited buffer)))
        (deserialize-from-bytes 'NESTED-TYPE data))

  Each nested message triggers another call to deserialize-from-bytes
  with no depth tracking.  An attacker who can send arbitrary protobuf
  messages to a gRPC server (or trick a client into deserializing a
  crafted response) can cause denial of service.

  This affects all generated message types that contain embedded message
  fields, including recursive/self-referential message definitions.

recommendation: |
  Upgrade to ag-gRPC >= 1.5.0, which adds *max-recursion-depth*
  (default 100, matching the protobuf spec recommendation).  The limit
  is enforced before each recursive deserialize-from-bytes call.

  To adjust the limit:

      (setf ag-proto:*max-recursion-depth* 50)   ; stricter
      (setf ag-proto:*max-recursion-depth* nil)   ; disable (not recommended)

related:

description: |
  The Gemini provider in cl-completions constructs its endpoint URL by
  appending the API key as a query parameter:

      (format nil "...generateContent?key=~A" api-key)

  This embeds the secret key directly in the URL string.  The key is
  then exposed through multiple channels:

    - HTTP proxy and server access logs, which routinely record full
      request URIs including query strings.
    - Debug output when *debug-stream* is bound, since the endpoint URL
      is logged as part of request tracing.
    - Error messages generated by safe-http-request (see CL-SEC-2026-0002),
      which include the full request URI in the signalled condition.
    - Any network-level monitoring or packet capture that inspects URL
      strings.

  The OpenAI and Anthropic providers in the same library correctly
  transmit credentials via HTTP headers, demonstrating that the
  header-based approach is already established in this codebase.

  Google's Gemini API supports the x-goog-api-key header as an
  alternative to the query parameter.

recommendation: |
  Move the API key from the URL query parameter to the x-goog-api-key
  HTTP header:

      (headers `(("Content-Type" . "application/json")
                 ("x-goog-api-key" . ,api-key)))

      (endpoint (format nil
                  "https://generativelanguage.googleapis.com/v1beta/models/~A:~A"
                  model
                  (if use-streaming "streamGenerateContent?alt=sse"
                                    "generateContent")))

  This is consistent with how the OpenAI and Anthropic providers in the
  same library already handle credentials.

related:
  - CL-SEC-2026-0002  # URI leak in error messages amplifies this exposure

references:

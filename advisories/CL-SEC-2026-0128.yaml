id: CL-SEC-2026-0128
title: "Header injection via CRLF in serialized NATS headers in cl-nats"
reported: 2026-03-31
published: 2026-03-31
severity: low
cvss: "CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:N/I:L/A:N"
cvss-score: 3.1
cwe: CWE-93

project:
  name: cl-nats
  homepage: https://github.com/atgreen/cl-nats
  affected-systems:
    - cl-nats

affected:
  introduced-in:  # 2026-02-14
    commit: "209806c"
    url: "https://github.com/atgreen/cl-nats/commit/209806c"
  fixed-in:
    commit: "074433b"
    version: "1.0.0"
    url: "https://github.com/atgreen/cl-nats/commit/074433b"
  affected-dists: []
    # cl-nats is not in Quicklisp or ocicl

audit:
  verdict: severity-adjusted
  original-severity: medium
  notes: |
    Exploitation depends on untrusted input passed directly into low-level protocol-building API. Current code now validates.

description: |
  The serialize-headers function does not validate header names or
  values before formatting them into the wire protocol. A header name
  or value containing CRLF characters can inject additional header
  lines or terminate the header block early, potentially corrupting
  message framing.

recommendation: |
  Validate that header names contain only printable ASCII without
  colons, spaces, or control characters. Validate that header values
  do not contain carriage return or newline characters. Reject invalid
  headers with an error.

references:
  - https://cwe.mitre.org/data/definitions/93.html

audit:
  verdict: severity-adjusted
  original-severity: medium
  notes: |
    GC behavior limits what zeroization can guarantee in any managed-memory language. Meaningful hygiene but overstated as exploitable vulnerability.

description: |
  RSA private key components (d, p, q, dp, dq, qinv) are returned as
  Common Lisp bignums and passed around as function parameters without
  ever being explicitly cleared from memory. Intermediate DER encodings
  and PEM string representations also persist in the Lisp heap. Common
  Lisp's garbage collector does not guarantee freed memory is
  overwritten, and bignum values may be copied during GC compaction.

  Core dumps, swap files, or memory forensics can recover key material.

recommendation: |
  For byte vectors containing key material (DER encodings, PEM
  strings), provide explicit clearing using (fill array 0) after use.
  Document the limitation clearly. Warn users that key material should
  be used in short-lived processes.

references:

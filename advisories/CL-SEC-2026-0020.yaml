description: |
  Both the DBI and Redis session stores use read-from-string as part
  of their default deserializer:

  In src/middleware/session/store/redis.lisp line 40:

      (deserializer (lambda (data)
                      (unmarshal (read-from-string
                                  (utf-8-bytes-to-string
                                   (base64-string-to-usb8-array data))))))

  In src/middleware/session/store/dbi.lisp line 38, the identical
  pattern.

  read-from-string is the full Common Lisp reader, which by default
  processes reader macros including #. (read-time evaluation).  If
  *read-eval* is not explicitly bound to nil before calling
  read-from-string, an attacker who can write to the session store
  (via SQL injection elsewhere, direct Redis access, a shared Redis
  instance, or any other data injection vector) can inject a payload
  such as:

      #.(uiop:run-program "id" :output :string)

  into the serialized session data, achieving arbitrary code execution
  when the session is loaded on the next request.

  The base64 encoding does not prevent exploitation -- the attacker
  simply base64-encodes the malicious payload.

recommendation: |
  Bind *read-eval* to nil before calling read-from-string:

      (deserializer (lambda (data)
                      (let ((*read-eval* nil))
                        (unmarshal (read-from-string
                                    (utf-8-bytes-to-string
                                     (base64-string-to-usb8-array data)))))))

  Better yet, replace read-from-string with a safe deserialization
  format (e.g., JSON or a purpose-built binary format) that does not
  invoke the Lisp reader at all.

references:
  - https://cwe.mitre.org/data/definitions/502.html
  - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/

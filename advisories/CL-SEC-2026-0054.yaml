description: |
  The chunk size parser (src/parser.lisp lines 556-591) accumulates
  hex digits into http-content-length without any upper bound check:

      (setf (http-content-length http)
            (+ (* 16 (http-content-length http)) unhex-val))

  The type is arbitrary-precision integer (CL bignum).  A malicious
  client can send a chunk size with thousands of hex digits
  (e.g., FFFFFF...FFFFFF\r\n), causing:

    1. Memory exhaustion via unbounded bignum allocation
    2. CPU exhaustion via progressively slower bignum multiplication
    3. Downstream logic errors when the astronomical content-length
       is compared against fixnum values

recommendation: |
  Limit chunk size hex digits to a reasonable maximum (e.g., 16
  digits for a 64-bit value).  Reject chunks with sizes that exceed
  a configurable maximum (e.g., 1GB).


id: CL-SEC-2026-0130
title: "Missing SVG/MathML foreign content handling enables XSS in cl-sanitize-html"
reported: 2026-03-31
published: 2026-03-31
severity: critical
cvss: "CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:N"

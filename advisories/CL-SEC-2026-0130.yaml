description: |
  The sanitizer has no special handling for SVG or MathML namespace
  elements. The dangerous-tag list that triggers full content removal
  does not include svg, math, object, iframe, embed, applet, base,
  meta, link, or template. These tags are handled by the "remove tag,
  keep children" path, which promotes their content into the document.

  SVG elements can contain foreignObject which re-enters HTML parsing
  context, and MathML's annotation-xml similarly re-enters HTML
  parsing. This enables mutation XSS (mXSS) where the sanitizer's DOM
  tree differs from the browser's re-parsing of the sanitized output.

recommendation: |
  Add all potentially dangerous tags to the full-removal list: svg,
  math, iframe, object, embed, applet, base, meta, link, template,
  audio, video, source, track, param, xmp, listing, and plaintext.

references:
  - https://cwe.mitre.org/data/definitions/79.html

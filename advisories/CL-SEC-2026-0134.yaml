id: CL-SEC-2026-0134
title: "Checksum validation optional and silently skipped in cl-selfupdate"
reported: 2026-03-31
published: 2026-03-31
severity: high
cvss: "CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:H/I:H/A:H"

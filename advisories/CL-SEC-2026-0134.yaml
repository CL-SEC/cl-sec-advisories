description: |
  The SHA256 validation system has multiple weaknesses. If no checksum
  asset (.sha256, checksums.txt, or SHA256SUMS) is present in the
  release, the download proceeds with zero integrity verification and
  no warning. Even when a checksum file is found, if the expected hash
  cannot be parsed for the specific asset, validation is silently
  skipped. The checksum file is fetched from the same unauthenticated
  channel as the binary, so an attacker who can compromise the release
  can replace both simultaneously. There is no GPG or minisign
  signature verification.

recommendation: |
  Implement cryptographic signature verification (GPG or minisign)
  with a signing key pinned in the application, not fetched from the
  release. At minimum, warn loudly or error when no checksum is
  available. Verify asset-size against the downloaded file size.

references:
  - https://cwe.mitre.org/data/definitions/354.html

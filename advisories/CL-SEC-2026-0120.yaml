description: |
  The Hunchentoot session cookie value is embedded directly in the HTML
  page as a JavaScript variable and sent over the WebSocket connection.
  Combined with the stored XSS vulnerability (CL-SEC-2026-0118), an
  attacker who injects JavaScript can extract the session ID and hijack
  another user's session, gaining access to their chat history and LLM
  completer which may hold API keys. The session ID is also logged
  server-side via log4cl.

recommendation: |
  Do not embed the session cookie in JavaScript. Use HTTP-only cookies
  and authenticate WebSocket connections through the cookie mechanism.
  Remove session ID logging or redact it. Set HttpOnly and Secure flags
  on session cookies.

references:
  - https://cwe.mitre.org/data/definitions/614.html

id: CL-SEC-2026-0120
title: "Session cookie exposed in client-side JavaScript in cl-chat"
reported: 2026-03-31
published: null
severity: medium
cvss: "CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:C/C:H/I:N/A:N"

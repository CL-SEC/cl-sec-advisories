id: CL-SEC-2026-0204
title: "No decompressed size limit in gRPC message decompression (gzip bomb)"
reported: 2026-04-20
published: 2026-04-20
severity: high
cvss: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:H"
cvss-score: 7.5
cwe: CWE-409  # Improper Handling of Highly Compressed Data (Zip/Decompression Bomb)


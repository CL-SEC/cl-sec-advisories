description: |
  The gRPC message decompression functions gzip-decompress and
  decompress-grpc-message (framing.lisp) decompress the full payload
  into memory without checking the resulting size.  A small compressed
  gRPC message (e.g., a few kilobytes of gzip-compressed zeros) can
  expand to gigabytes, exhausting available memory and crashing the
  process.

  The gzip decompression path was:

      (chipz:decompress nil 'chipz:gzip simple-data)

  The result is returned without any size validation.  The existing
  *max-message-size* limit (CL-SEC-2026-0197) only checks the
  compressed wire size, not the decompressed output.

  This affects both server-side request decompression and client-side
  response decompression when gzip or deflate encoding is negotiated
  via the grpc-encoding header.

recommendation: |
  Upgrade to ag-grpc >= 1.5.0, which adds *max-decompressed-size*
  (default 16 MiB).  The decompressed output size is checked before
  the data is returned to the caller.

  To adjust the limit:

      (setf ag-grpc:*max-decompressed-size* (* 64 1024 1024))  ; 64 MiB
      (setf ag-grpc:*max-decompressed-size* nil)                ; disable (not recommended)

related:
  - CL-SEC-2026-0197  # Unbounded allocation in length-delimited decoding


description: |
  The protocol-allowed-p function checks if a URL starts with "/" and
  returns true, intending to allow relative URLs. However, protocol-
  relative URLs starting with "//" (e.g., "//evil.com/track.gif") also
  pass this check, allowing an attacker to load resources from arbitrary
  domains. This enables tracking pixels, data exfiltration via URL
  parameters, and phishing via image replacement.

recommendation: |
  Check that relative URLs start with a single "/" not followed by
  another "/". Explicitly reject protocol-relative URLs, or require
  an explicit scheme from the allowed protocols list.


audit:
  verdict: withdrawn
  original-severity: high
  notes: |
    Withdrawn. The `read` pattern is a compile-time macro that expands into code the
    developer explicitly wrote. Using it on untrusted input is a developer choice, not
    a hidden trap — equivalent to calling read-from-string directly. A PR (#154) proposing
    a *read-eval* nil binding as defense-in-depth was submitted but closed without merging,
    as the original behavior is working-as-designed, not a vulnerability in trivia itself.

description: |
  The `read` pattern in trivia (level2/derived2.lisp, lines 32-44)
  expands to a runtime call to READ-FROM-STRING on the value being
  matched, without binding *READ-EVAL* to NIL.  Common Lisp's reader
  evaluates #.(form) reader macros at read time when *READ-EVAL* is T
  (the default), which means an attacker who controls the string being
  matched can achieve arbitrary code execution.

  For example:

      (match user-supplied-string
        ((read x) (format t "Parsed: ~a" x)))

  If user-supplied-string is "#.(delete-file \"/etc/important\")", the
  reader will execute the deletion before the match even completes.

  The pattern also silently swallows END-OF-FILE and PARSE-ERROR
  conditions, masking failed exploitation attempts and making the
  vulnerability harder to detect in logs.

recommendation: |
  Bind *READ-EVAL* to NIL around the READ-FROM-STRING call:

      `(guard1 (,it :type string) (stringp ,it)
               (let ((*read-eval* nil))
                 (handler-case (read-from-string ,it)
                   (end-of-file ())
                   (parse-error ()))) ,pattern)

  Additionally, consider documenting that the `read` pattern should
  never be used on untrusted input even with this fix, as the CL
  reader has a large attack surface beyond just *READ-EVAL*.


audit:
  verdict: severity-adjusted
  original-severity: high
  notes: |
    Drakma backend uses :verify :required. Exposure depends on backend choice and TLS configuration. Not a blanket library-wide MITM.

description: |
  Neither the dexador nor drakma HTTP backends explicitly configure TLS
  certificate verification parameters. Whether certificates are verified
  depends entirely on the underlying TLS library defaults. The library
  loads pure-tls/cl+ssl-compat by default, and the legacy cl+ssl
  fallback also does not verify certificates by default unless
  explicitly configured. The library never sets :verify t or configures
  CA certificates.

  If TLS verification is not active, an attacker in a network position
  can intercept update downloads and serve a malicious binary.

recommendation: |
  Explicitly configure TLS certificate verification in both HTTP
  backends. For drakma, pass :verify :required and configure CA
  certificates. For dexador, verify the underlying TLS library is
  configured to validate certificates. Document and test the TLS
  verification posture.

references:
  - https://cwe.mitre.org/data/definitions/295.html

id: CL-SEC-2026-0119
title: "WebSocket and HTTP servers lack TLS encryption in cl-chat"
reported: 2026-03-31
published: 2026-03-31
severity: low
cvss: "CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:H/I:H/A:N"
cvss-score: 7.4
cwe: CWE-319

project:
  name: cl-chat
  homepage: https://github.com/atgreen/cl-chat
  affected-systems:
    - web-chat
  unaffected-systems:
    - chat

affected:
  introduced-in:  # 2024-03-31
    commit: "494e289"
    url: "https://github.com/atgreen/cl-chat/commit/494e289"
  fixed-in:
    commit: "d8b447c"
    version: "1.1.0"
    url: "https://github.com/atgreen/cl-chat/commit/d8b447c"
  affected-dists:
    - dist: ocicl
      first-affected: "20260309-787c4bc"
      last-affected: null
      fixed-in: null

audit:
  verdict: severity-adjusted
  original-severity: medium
  notes: |
    Deployment/defaults issue in a simple demo-style chat app. Not a hidden vulnerability in a reusable security library.

description: |
  The WebSocket connection is hardcoded to use unencrypted ws://
  (not wss://), and the HTTP server is created without TLS. All chat
  messages, including user prompts that may contain sensitive
  information, and LLM responses are transmitted in cleartext. In a
  non-localhost deployment, this exposes all chat content and session
  identifiers to eavesdropping and man-in-the-middle attacks.

recommendation: |
  Configure TLS for both the HTTP and WebSocket servers. Use wss://
  for WebSocket connections. At minimum, document that this is intended
  only for localhost or development use.

references:
  - https://cwe.mitre.org/data/definitions/319.html

description: |
  When a second Content-Length header is encountered,
  parse-header-field-and-value (src/parser.lisp line 314)
  unconditionally overwrites the previously stored value:

      (setf (http-content-length http) content-length)

  There is no check for whether http-content-length has already been
  set.  Per RFC 9112 Section 6.3, a message with multiple
  Content-Length values that disagree MUST be rejected as invalid.

  By silently accepting the last value, fast-http allows a front-end
  proxy that uses the first Content-Length to disagree with fast-http
  (which uses the last), enabling classic CL-CL request smuggling.

  Additionally, the higher-level collect-prev-header-value function
  (fast-http.lisp lines 129-135) concatenates duplicate header values
  with ", " -- but this happens after the parser has already set
  http-content-length to the second value.  The http struct uses the
  last CL value while the headers hash table presents "100, 50" --
  an inconsistency that further enables smuggling.

recommendation: |
  Reject requests with duplicate Content-Length headers that have
  different values.  If values are identical, accept the single
  value.  If values differ, return 400 Bad Request.

references:

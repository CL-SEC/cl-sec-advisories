id: CL-SEC-2026-0139
title: "No minimum RSA key size enforcement in cl-x509"
reported: 2026-03-31
published: 2026-03-31
severity: high
cvss: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N"

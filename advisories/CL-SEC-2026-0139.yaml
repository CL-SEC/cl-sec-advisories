description: |
  The generate-rsa-key-pair function accepts an arbitrary :bits
  parameter with a default of 2048 but imposes no minimum. A caller
  can generate keys of any size including fatally weak ones such as
  512, 256, or 64 bits. RSA-512 was factored publicly in 1999. NIST
  has required a minimum of 2048 bits since 2013.

  If cl-x509 is used to generate CA certificates with small keys, the
  entire PKI chain rooted in that CA is compromised. An attacker who
  can factor the CA's modulus can forge arbitrary certificates.

recommendation: |
  Enforce a minimum key size of 2048 bits in generate-rsa-key-pair.
  Signal a clear error for any request below this floor. Consider
  defaulting to 4096 bits for CA certificates.

references:
  - https://cwe.mitre.org/data/definitions/326.html

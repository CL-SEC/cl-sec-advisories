id: CL-SEC-2026-0137
title: "Archive path traversal in tar and zip extraction in cl-selfupdate"
reported: 2026-03-31
published: null
severity: medium
cvss: "CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:U/C:N/I:H/A:N"

      last-affected: null
      fixed-in: null

description: |
  The tar extraction code uses file-namestring to extract the basename,
  but its behavior with malicious input is implementation-defined. On
  some CL implementations, crafted pathnames with path traversal
  sequences may not be fully sanitized. The zip extraction has the same
  pattern.

  Additionally, the executable-name matching uses substring search
  rather than exact match, meaning a crafted archive entry name like
  "legit-app-evil-payload" matches an executable-name of "legit-app".

recommendation: |
  Validate that extracted paths are strictly within the output
  directory by resolving the full path and checking the prefix. Use
  exact basename matching rather than substring search for
  executable-name. Reject archive entries containing ".." path
  components.

references:
  - https://cwe.mitre.org/data/definitions/22.html

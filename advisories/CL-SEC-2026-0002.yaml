description: |
  The safe-http-request function in cl-completions signals an error
  condition that includes the full request URI obtained via
  dex:request-uri:

      (error "An HTTP request to ~S has failed (status=~A).~%~%~A"
             (dex:request-uri e)
             (dex:response-status e)
             string-body)

  When combined with CL-SEC-2026-0001 (Gemini API key in URL), this
  leaks the API key into any error handler, log collector, or
  condition-reporting mechanism that captures the error text.

  Even without CL-SEC-2026-0001, this is independently a concern:
  endpoint URLs may contain session tokens, internal hostnames, or
  path-based routing information that should not appear in error output
  visible to end users or forwarded to external error-tracking services.

  This vulnerability predates the Gemini provider — it was introduced
  when the error-handling wrapper was first added in 392c08c, affecting
  all providers.

recommendation: |
  Strip query parameters from the URI before including it in error
  messages:

      (let* ((uri (princ-to-string (dex:request-uri e)))
             (qpos (position #\? uri))
             (safe-uri (if qpos (subseq uri 0 qpos) uri)))
        (error "An HTTP request to ~S has failed (status=~A).~%~%~A"
               safe-uri
               (dex:response-status e)
               string-body))

  Alternatively, omit the URI entirely from the error message and log
  it separately at a debug level that is not captured in production.

related:
  - CL-SEC-2026-0001  # API key in URL is the primary source of sensitive data in the URI

references:
  - https://cwe.mitre.org/data/definitions/209.html
  - https://owasp.org/www-community/Improper_Error_Handling

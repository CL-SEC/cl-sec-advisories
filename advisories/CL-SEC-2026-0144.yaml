audit:
  verdict: withdrawn
  original-severity: low
  notes: |
    Withdrawn per updated audit. cl-x509 is a certificate generation library, not a CA policy engine. Generating whatever certificate structure the caller requests is expected behavior — comparable to Go x509.CreateCertificate or Python cryptography's CertificateBuilder.

description: |
  The generate-signed-certificate function accepts any RSA key pair
  as the signer with no verification that the signing key belongs to
  a CA certificate with BasicConstraints CA=true. The extensions
  parameter is entirely optional, so a certificate can be generated
  with no extensions at all. Some implementations treat missing
  BasicConstraints as CA=false, but others may not, creating
  certificates that bypass path validation in lenient implementations.

recommendation: |
  When extensions is nil in generate-signed-certificate, default to a
  sensible set (BasicConstraints CA=false, KeyUsage
  digitalSignature+keyEncipherment). Consider adding an optional
  :ca-cert parameter that validates the signing certificate has
  CA=true.

references:
  - https://cwe.mitre.org/data/definitions/295.html

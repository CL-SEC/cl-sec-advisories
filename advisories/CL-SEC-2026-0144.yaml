id: CL-SEC-2026-0144
title: "No BasicConstraints enforcement for signing keys in cl-x509"
reported: 2026-03-31
published: 2026-03-31
severity: informational
cvss: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N"

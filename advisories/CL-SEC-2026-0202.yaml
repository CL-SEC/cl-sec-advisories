description: |
  The ct-equal-mask function in src/utils.lisp masked the XOR of the
  two input lengths with #xFF before accumulating into the diff
  variable.  When two inputs differ in length by a multiple of 256,
  the masked length XOR is zero, and if the first min(len-a, len-b)
  bytes are identical, ct-equal-mask returns #xFF (equal).

  This function is used in ML-KEM-768 decapsulation (src/crypto/ml-kem.lisp)
  to compare the re-encrypted ciphertext against the received ciphertext
  for implicit rejection (FIPS 203 Section 7.3).  A false "equal"
  result causes decapsulation to return the real shared secret instead
  of the rejection key, breaking IND-CCA2 security.

  In practice, ML-KEM ciphertexts are fixed-length within a parameter
  set, which limits immediate exploitability.  However, the function
  is a general-purpose primitive and any future use with variable-length
  inputs (MACs, hashes, authentication tokens) would be directly
  exploitable as an authentication bypass.

  The fix accumulates the full fixnum XOR of lengths and folds all
  bytes together before the mask derivation, ensuring any non-zero
  length difference produces a "not equal" result.

recommendation: |
  Update to pure-tls 1.11.1 or later.  Review any code that calls
  ct-equal-mask with potentially variable-length inputs.

references:
  - https://cwe.mitre.org/data/definitions/697.html

description: |
  When a request contains both Transfer-Encoding: chunked and a
  Content-Length header, fast-http accepts both without error.  The
  parser decides body framing based on the http-chunked-p flag
  (src/parser.lisp lines 717-720):

      (setf (http-state http)
            (if (http-chunked-p http)
                +state-chunk-size+
                +state-body+))

  Per RFC 9112 Section 6.3: "If a message is received with both a
  Transfer-Encoding and a Content-Length header field, the
  Transfer-Encoding overrides the Content-Length.  Such a message
  might indicate an attempt to perform request smuggling and ought
  to be handled as an error."

  fast-http does NOT reject this as an error and does NOT clear the
  Content-Length when Transfer-Encoding is present.  A proxy that
  routes based on Content-Length while fast-http uses chunked framing
  creates a classic TE-CL smuggling vector.

  This is the standard deployment model for Woo (the CL web server
  that uses fast-http), which is typically placed behind nginx or
  another reverse proxy.

recommendation: |
  Reject requests that contain both Transfer-Encoding and
  Content-Length headers with a 400 Bad Request response.

  If backward compatibility requires accepting such requests,
  at minimum clear http-content-length when Transfer-Encoding:
  chunked is detected.

references:
  - https://cwe.mitre.org/data/definitions/444.html
  - https://datatracker.ietf.org/doc/html/rfc9112#section-6.3
  - https://portswigger.net/web-security/request-smuggling
